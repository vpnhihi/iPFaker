# Build iPFaker MG+CT dylibs on GitHub-hosted macOS (no local Mac needed)
# Trigger: Actions → "Build Theos rootless" → Run workflow
# Artifact: ipfaker-dylibs.zip (iPFakerMG.dylib, iPFakerCT.dylib, plists)

name: Build Theos rootless

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos + ldid
        run: |
          set -e
          brew install ldid || true
          # fallback: download ldid binary if brew fails
          if ! command -v ldid >/dev/null 2>&1; then
            curl -L -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_x86_64 || true
            if [ -f /tmp/ldid ]; then
              chmod +x /tmp/ldid
              sudo mv /tmp/ldid /usr/local/bin/ldid
            fi
          fi
          command -v ldid
          ldid 2>&1 | head -3 || true
          export THEOS=$HOME/theos
          if [ ! -d "$THEOS" ]; then
            git clone --depth=1 https://github.com/theos/theos.git "$THEOS"
            cd "$THEOS"
            git submodule update --init --recursive
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS/sdks" ] || [ -z "$(ls -A $THEOS/sdks 2>/dev/null)" ]; then
            git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks" || true
          fi

      - name: Build dylibs
        working-directory: theos
        run: |
          set -e
          export THEOS=$HOME/theos
          export PATH="/usr/local/bin:$PATH"
          chmod 755 layout/DEBIAN/postinst 2>/dev/null || true
          make clean || true
          # Release-ish: FINALPACKAGE avoids debug leftover issues
          make all FINALPACKAGE=1
          make package FINALPACKAGE=1 || true
          echo "=== built dylibs ==="
          find .theos -name 'iPFaker*.dylib' | head -20

      - name: Collect dylibs
        working-directory: theos
        run: |
          set -e
          mkdir -p dist
          # Prefer release/obj over debug if both exist
          find .theos/obj -name 'iPFakerMG.dylib' 2>/dev/null | head -5
          # copy largest/newest non-debug if present
          MG=$(find .theos -path '*debug*' -prune -o -name 'iPFakerMG.dylib' -print 2>/dev/null | head -1)
          CT=$(find .theos -path '*debug*' -prune -o -name 'iPFakerCT.dylib' -print 2>/dev/null | head -1)
          if [ -z "$MG" ]; then MG=$(find .theos -name 'iPFakerMG.dylib' | head -1); fi
          if [ -z "$CT" ]; then CT=$(find .theos -name 'iPFakerCT.dylib' | head -1); fi
          cp -f "$MG" dist/iPFakerMG.dylib
          cp -f "$CT" dist/iPFakerCT.dylib
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/*.plist dist/ 2>/dev/null || true
          find packages -name '*.deb' -exec cp -f {} dist/ \; 2>/dev/null || true
          ls -la dist
          file dist/iPFakerMG.dylib dist/iPFakerCT.dylib || true
          # Clean re-sign: REMOVE previous signature then single ldid pass
          # (codesign+ldid double-pass caused "signature does not cover entire file" on Dopamine)
          for d in dist/iPFakerMG.dylib dist/iPFakerCT.dylib; do
            echo "=== fixup $d ==="
            otool -L "$d" || true
            install_name_tool -change \
              @rpath/CydiaSubstrate.framework/CydiaSubstrate \
              /var/jb/usr/lib/libsubstrate.dylib "$d" 2>/dev/null || true
            install_name_tool -change \
              /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate \
              /var/jb/usr/lib/libsubstrate.dylib "$d" 2>/dev/null || true
            # strip any existing code signature blob
            codesign --remove-signature "$d" 2>/dev/null || true
            # single ad-hoc sign with ldid (JB standard)
            ldid -S "$d"
            echo "size=$(stat -f%z "$d" 2>/dev/null || stat -c%s "$d")"
            ldid -h "$d" 2>&1 | head -20 || true
            codesign -dvvv "$d" 2>&1 | head -15 || true
            codesign --verify --verbose=4 "$d" 2>&1 || true
            otool -l "$d" | grep -A4 LC_CODE_SIGNATURE || true
          done
          if otool -L dist/iPFakerMG.dylib | grep -q 'CydiaSubstrate.framework'; then
            echo "FATAL: still links CydiaSubstrate.framework"
            exit 1
          fi
          # Fail CI if signature missing
          ldid -h dist/iPFakerMG.dylib 2>&1 | grep -q CDHash=
          ldid -h dist/iPFakerCT.dylib 2>&1 | grep -q CDHash=


      - name: Build iPFaker.app
        working-directory: theos/app
        run: |
          set -e
          export THEOS=$HOME/theos
          export PATH="/usr/local/bin:$PATH"
          chmod 755 layout/DEBIAN/postinst 2>/dev/null || true
          make clean || true
          make package FINALPACKAGE=1
          mkdir -p ../dist/app
          find .theos packages -name 'iPFaker' -o -name '*.deb' -o -name 'iPFaker.app' 2>/dev/null | head -30
          APP=$(find .theos -type d -name 'iPFaker.app' | head -1)
          if [ -n "$APP" ]; then
            cp -a "$APP" ../dist/app/
            BIN="../dist/app/iPFaker.app/iPFaker"
            if [ -f "$BIN" ]; then
              codesign --remove-signature "$BIN" 2>/dev/null || true
              ldid -Sentitlements.plist "$BIN" || ldid -S "$BIN"
              ldid -h "$BIN" 2>&1 | head -15 || true
            fi
          fi
          find packages -name '*.deb' -exec cp -f {} ../dist/app/ \; 2>/dev/null || true
          # also copy release dylibs for deb packager
          mkdir -p ../dist
          MG=$(find ../.theos .theos ../obj -name 'iPFakerMG.dylib' 2>/dev/null | head -1)
          CT=$(find ../.theos .theos ../obj -name 'iPFakerCT.dylib' 2>/dev/null | head -1)
          # prefer parent theos dist from earlier step
          [ -f ../dist/iPFakerMG.dylib ] || { [ -n "$MG" ] && cp -f "$MG" ../dist/iPFakerMG.dylib; }
          [ -f ../dist/iPFakerCT.dylib ] || { [ -n "$CT" ] && cp -f "$CT" ../dist/iPFakerCT.dylib; }
          ls -laR ../dist/app || true

      - name: Build Sileo .deb
        working-directory: .
        run: |
          set -e
          # Prefer freshly built CI dylibs
          mkdir -p dylibs_ci theos/dist/app
          if [ -f theos/dist/iPFakerMG.dylib ]; then
            cp -f theos/dist/iPFakerMG.dylib dylibs_ci/
            cp -f theos/dist/iPFakerCT.dylib dylibs_ci/
          fi
          python3 scripts/build_sileo_deb.py --version 2.3.0 \
            --app theos/dist/app/iPFaker.app 2>/dev/null \
            || python3 scripts/build_sileo_deb.py --version 2.3.0
          ls -la dist/sileo/
          ls -la dist/sileo/repo/debs/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipfaker-sileo
          path: |
            dist/sileo/**
            theos/dist/**
          if-no-files-found: error
