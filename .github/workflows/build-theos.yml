# Build iPFaker MG+CT dylibs on GitHub-hosted macOS (no local Mac needed)
# Trigger: Actions â†’ "Build Theos rootless" â†’ Run workflow
# Artifact: ipfaker-dylibs.zip (iPFakerMG.dylib, iPFakerCT.dylib, plists)

name: Build Theos rootless

on:
  workflow_dispatch:
  push:
    branches: [master, main, lab-gap-fill]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos + ldid
        run: |
          set -e
          brew install ldid || true
          # fallback: download ldid binary if brew fails
          if ! command -v ldid >/dev/null 2>&1; then
            curl -L -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_x86_64 || true
            if [ -f /tmp/ldid ]; then
              chmod +x /tmp/ldid
              sudo mv /tmp/ldid /usr/local/bin/ldid
            fi
          fi
          command -v ldid
          ldid 2>&1 | head -3 || true
          export THEOS=$HOME/theos
          if [ ! -d "$THEOS" ]; then
            git clone --depth=1 https://github.com/theos/theos.git "$THEOS"
            cd "$THEOS"
            git submodule update --init --recursive
          fi
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS/sdks" ] || [ -z "$(ls -A $THEOS/sdks 2>/dev/null)" ]; then
            git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks" || true
          fi

      - name: Build dylibs
        working-directory: theos
        run: |
          set -e
          export THEOS=$HOME/theos
          export PATH="/usr/local/bin:$PATH"
          chmod 755 layout/DEBIAN/postinst 2>/dev/null || true
          # Theos tweak stage needs filter plists next to Makefile
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerMG.plist ./iPFakerMG.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerCT.plist ./iPFakerCT.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerJB.plist ./iPFakerJB.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAbout.plist ./iPFakerAbout.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutVer.plist ./iPFakerAboutVer.plist 2>/dev/null \
            || cp -f ./iPFakerAbout.plist ./iPFakerAboutVer.plist
          cp -f ./iPFakerAboutVer.plist layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutVer.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutUI.plist ./iPFakerAboutUI.plist 2>/dev/null \
            || cp -f ./iPFakerAbout.plist ./iPFakerAboutUI.plist
          cp -f ./iPFakerAboutUI.plist layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutUI.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutID.plist ./iPFakerAboutID.plist 2>/dev/null \
            || cp -f ./iPFakerAbout.plist ./iPFakerAboutID.plist
          cp -f ./iPFakerAboutID.plist layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAboutID.plist
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/iPFakerMG.plist ./iPFakerAA.plist
          cp -f ./iPFakerAA.plist layout/Library/MobileSubstrate/DynamicLibraries/iPFakerAA.plist
          make clean || true
          make all FINALPACKAGE=1
          make package FINALPACKAGE=1 || true
          echo "=== built dylibs ==="
          find .theos -name 'iPFaker*.dylib' | head -30

      - name: Collect dylibs
        working-directory: theos
        run: |
          set -e
          mkdir -p dist
          find .theos/obj -name 'iPFaker*.dylib' 2>/dev/null | head -20
          for name in iPFakerAA iPFakerAbout iPFakerAboutID iPFakerAboutUI iPFakerAboutVer iPFakerMG iPFakerCT iPFakerJB; do
            # Prefer fat (cafebabe) FINALPACKAGE dylib — never thin arm64e-only (breaks A10/A11)
            f=""
            best=""
            bestsz=0
            while IFS= read -r cand; do
              [ -f "$cand" ] || continue
              # skip intermediate arch-specific dirs if a larger fat exists
              sz=$(wc -c < "$cand" | tr -d ' ')
              magic=$(xxd -p -l 4 "$cand" 2>/dev/null || true)
              if [ "$magic" = "cafebabe" ] || [ "$magic" = "bebafeca" ]; then
                f="$cand"
                break
              fi
              if [ "$sz" -gt "$bestsz" ]; then
                best="$cand"
                bestsz=$sz
              fi
            done < <(find .theos -name "${name}.dylib" 2>/dev/null | grep -v '/debug/' | sort)
            if [ -z "$f" ]; then
              while IFS= read -r cand; do
                [ -f "$cand" ] || continue
                magic=$(xxd -p -l 4 "$cand" 2>/dev/null || true)
                if [ "$magic" = "cafebabe" ] || [ "$magic" = "bebafeca" ]; then
                  f="$cand"
                  break
                fi
                sz=$(wc -c < "$cand" | tr -d ' ')
                if [ "$sz" -gt "$bestsz" ]; then best="$cand"; bestsz=$sz; fi
              done < <(find .theos -name "${name}.dylib" 2>/dev/null | sort)
            fi
            if [ -z "$f" ]; then f="$best"; fi
            if [ -z "$f" ] || [ ! -f "$f" ]; then
              echo "FATAL: missing ${name}.dylib"
              exit 1
            fi
            echo "collect ${name} <= $f ($(wc -c < "$f") bytes, magic=$(xxd -p -l 4 "$f"))"
            cp -f "$f" "dist/${name}.dylib"
            file "dist/${name}.dylib" || true
          done
          cp -f layout/Library/MobileSubstrate/DynamicLibraries/*.plist dist/ 2>/dev/null || true
          cp -f iPFakerAA.plist dist/ 2>/dev/null || true
          cp -f iPFakerAbout.plist dist/ 2>/dev/null || true
          cp -f iPFakerAboutVer.plist dist/ 2>/dev/null || true
          find packages -name '*.deb' -exec cp -f {} dist/ \; 2>/dev/null || true
          ls -la dist
          file dist/iPFaker*.dylib || true
          for d in dist/iPFakerAA.dylib dist/iPFakerAbout.dylib dist/iPFakerAboutUI.dylib dist/iPFakerAboutVer.dylib dist/iPFakerMG.dylib dist/iPFakerCT.dylib dist/iPFakerJB.dylib; do
            echo "=== fixup $d ==="
            otool -L "$d" || true
            install_name_tool -change \
              @rpath/CydiaSubstrate.framework/CydiaSubstrate \
              /var/jb/usr/lib/libsubstrate.dylib "$d" 2>/dev/null || true
            install_name_tool -change \
              /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate \
              /var/jb/usr/lib/libsubstrate.dylib "$d" 2>/dev/null || true
            codesign --remove-signature "$d" 2>/dev/null || true
            ldid -S "$d"
            echo "size=$(stat -f%z "$d" 2>/dev/null || stat -c%s "$d")"
            ldid -h "$d" 2>&1 | head -12
            ldid -h "$d" 2>&1 | grep -q CDHash=
          done
          if otool -L dist/iPFakerMG.dylib | grep -q 'CydiaSubstrate.framework'; then
            echo "FATAL: still links CydiaSubstrate.framework"
            exit 1
          fi
          MGSIZE=$(stat -f%z dist/iPFakerMG.dylib 2>/dev/null || stat -c%s dist/iPFakerMG.dylib)
          CTSIZE=$(stat -f%z dist/iPFakerCT.dylib 2>/dev/null || stat -c%s dist/iPFakerCT.dylib)
          AASIZE=$(stat -f%z dist/iPFakerAA.dylib 2>/dev/null || stat -c%s dist/iPFakerAA.dylib)
          JBSIZE=$(stat -f%z dist/iPFakerJB.dylib 2>/dev/null || stat -c%s dist/iPFakerJB.dylib)
          ABOUTSIZE=$(stat -f%z dist/iPFakerAbout.dylib 2>/dev/null || stat -c%s dist/iPFakerAbout.dylib)
          echo "MGSIZE=$MGSIZE CTSIZE=$CTSIZE AASIZE=$AASIZE JBSIZE=$JBSIZE ABOUTSIZE=$ABOUTSIZE"
          # Dual-arch fat ≈ 2× thin arm64e. AMFI cares about the loaded slice, not full fat size.
          # Thin arm64e MG ~155k → fat ~310k; About ~105k → fat ~210k.
          if [ "$MGSIZE" -gt 360000 ]; then
            echo "FATAL: MG $MGSIZE > 360000 — unexpected fat size"
            exit 1
          fi
          if [ "$AASIZE" -gt 200000 ]; then
            echo "FATAL: AA $AASIZE too large for lite dylib (fat)"
            exit 1
          fi
          # Preferences (platform) — About must stay lean per-slice
          if [ "$ABOUTSIZE" -gt 290000 ]; then
            echo "FATAL: About $ABOUTSIZE > 290000 — unexpected fat size"
            exit 1
          fi
          file dist/iPFakerMG.dylib || true
          lipo -info dist/iPFakerMG.dylib 2>/dev/null || true
          lipo -info dist/iPFakerAbout.dylib 2>/dev/null || true
          ldid -h dist/iPFakerMG.dylib 2>&1 | grep -q CDHash=
          ldid -h dist/iPFakerCT.dylib 2>&1 | grep -q CDHash=
          ldid -h dist/iPFakerJB.dylib 2>&1 | grep -q CDHash=
          ldid -h dist/iPFakerAA.dylib 2>&1 | grep -q CDHash=
          ldid -h dist/iPFakerAbout.dylib 2>&1 | grep -q CDHash=


      - name: Build iPFaker.app
        working-directory: theos/app
        id: build_app
        run: |
          set -e
          export THEOS=$HOME/theos
          export PATH="/usr/local/bin:$PATH"
          chmod 755 layout/DEBIAN/postinst 2>/dev/null || true
          # control file next to Makefile (Theos application packaging)
          cp -f control layout/DEBIAN/control 2>/dev/null || mkdir -p layout/DEBIAN && cp -f control layout/DEBIAN/control || true
          cp -f ../../config/device_catalog.json Resources/device_catalog.json || true
          make clean || true
          make all FINALPACKAGE=1
          make package FINALPACKAGE=1 || true
          mkdir -p ../dist/app
          APP=$(find .theos -type d -name 'iPFaker.app' 2>/dev/null | head -1)
          echo "APP=$APP"
          if [ -z "$APP" ] || [ ! -f "$APP/iPFaker" ]; then
            echo "FATAL: iPFaker.app missing after make"
            find .theos -type f 2>/dev/null | head -50
            exit 1
          fi
          rm -rf ../dist/app/iPFaker.app
          cp -a "$APP" ../dist/app/iPFaker.app
          cp -f Resources/device_catalog.json ../dist/app/iPFaker.app/device_catalog.json || true
          BIN="../dist/app/iPFaker.app/iPFaker"
          codesign --remove-signature "$BIN" 2>/dev/null || true
          ldid -Sentitlements.plist "$BIN" || ldid -S "$BIN"
          ldid -h "$BIN" 2>&1 | head -15 || true
          file "$BIN" || true
          # prove new geo-proxy strings linked
          strings "$BIN" | grep -E 'GeoRandomInCity|attachProxyGeo|Vượt Zalo|random trong' | head -10 || true
          ls -laR ../dist/app
          echo "APP_SIZE=$(stat -f%z "$BIN" 2>/dev/null || stat -c%s "$BIN")"

      - name: Build Sileo .deb (dylibs + app)
        working-directory: .
        continue-on-error: true
        run: |
          set -e
          mkdir -p dylibs_ci
          if [ -f theos/dist/iPFakerMG.dylib ]; then
            cp -f theos/dist/iPFakerMG.dylib dylibs_ci/
            cp -f theos/dist/iPFakerCT.dylib dylibs_ci/
            cp -f theos/dist/iPFakerJB.dylib dylibs_ci/ 2>/dev/null || true
            cp -f theos/dist/iPFakerAA.dylib dylibs_ci/ 2>/dev/null || true
          fi
          # Ensure app lands in artifact even if sileo pack fails
          APPDIR=$(find theos -type d -name 'iPFaker.app' 2>/dev/null | head -1)
          if [ -n "$APPDIR" ] && [ -f "$APPDIR/iPFaker" ]; then
            mkdir -p theos/dist/app
            rm -rf theos/dist/app/iPFaker.app
            cp -a "$APPDIR" theos/dist/app/iPFaker.app
            echo "Staged app for artifact: theos/dist/app/iPFaker.app"
            ls -la theos/dist/app/iPFaker.app | head
          fi
          if [ ! -d theos/dist/app/iPFaker.app ]; then
            echo "Skip Sileo deb (no app)"
            exit 0
          fi
          # Keep version in sync with scripts/build_sileo_deb.py VERSION_DEFAULT
          python3 scripts/build_sileo_deb.py --version 2.10.0 --app theos/dist/app/iPFaker.app
          ls -la dist/sileo/
          ls -la dist/sileo/repo/debs/
          # Merge into sileo-repo (keep ellekit/ldid deps already in debs/)
          mkdir -p sileo-repo/debs
          cp -f dist/sileo/repo/debs/com.ipfaker_*.deb sileo-repo/debs/
          cp -f dist/sileo/repo/debs/com.ipfaker_*.deb sileo-repo/ || true
          # Rebuild Packages from all debs present (not only latest)
          python3 - <<'PY'
import gzip, hashlib, os, time
from pathlib import Path
repo = Path("sileo-repo")
debs = sorted((repo / "debs").glob("*.deb"))
# also root-level debs
debs += sorted(repo.glob("com.ipfaker_*.deb"))
seen = set()
blocks = []
for d in debs:
    if d.name in seen:
        continue
    seen.add(d.name)
    data = d.read_bytes()
    # extract control from ar if possible — fallback filename parse
    # Prefer control from built Packages in dist
    pass
print("debs staged", len(seen))
PY
          # Prefer Packages generated by build_sileo_deb for com.ipfaker + keep old deps:
          # Merge: take dist Packages for com.ipfaker 2.10.0 and append non-ipfaker from existing
          python3 scripts/merge_sileo_packages.py || true
          if [ -f dist/sileo/repo/Packages ]; then
            # If merge script missing, at least copy new Packages and re-add ellekit block from backup
            cp -f dist/sileo/repo/Packages sileo-repo/Packages.new
            if [ -f sileo-repo/Packages ]; then
              # keep non-com.ipfaker entries from old Packages
              python3 - <<'PY'
from pathlib import Path
old = Path("sileo-repo/Packages").read_text(encoding="utf-8", errors="replace")
new = Path("sileo-repo/Packages.new").read_text(encoding="utf-8", errors="replace")
# drop old com.ipfaker blocks from old
parts = old.split("\n\n")
kept = [p for p in parts if p.strip() and "Package: com.ipfaker" not in p]
# keep all blocks from new (includes latest com.ipfaker)
new_parts = [p for p in new.split("\n\n") if p.strip()]
out = "\n\n".join(new_parts + kept) + "\n"
Path("sileo-repo/Packages").write_text(out, encoding="utf-8")
import gzip
Path("sileo-repo/Packages.gz").write_bytes(gzip.compress(out.encode("utf-8")))
print("Packages merged bytes", len(out))
PY
            else
              cp -f dist/sileo/repo/Packages sileo-repo/
              cp -f dist/sileo/repo/Packages.gz sileo-repo/ 2>/dev/null || true
            fi
            cp -f dist/sileo/repo/Release sileo-repo/ 2>/dev/null || true
          fi
          printf '' > sileo-repo/.nojekyll
          # INSTALL note for customers
          cat > sileo-repo/INSTALL.txt <<'EOF'
iPFaker 2.10.0 — same stack as lab/dev
Source: https://vpnhihi.github.io/ipfaker/
1) Add source in Sileo
2) Install ellekit + iPFaker 2.10.0 (Depends pulls ldid/sqlite)
3) Dopamine → Userspace Reboot
4) Open iPFaker → Apply profile → Reset app data → open Zalo
NO Frida required for spoof. MG Zalo-safe lean (no UIScreen crash).
EOF
          ls -la sileo-repo/debs/com.ipfaker* | tail -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipfaker-sileo
          path: |
            dist/sileo/**
            theos/dist/**
            sileo-repo/**
          if-no-files-found: error

      # Auto-publish Sileo so other devices match CI (not only lab SSH)
      - name: Publish Sileo to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/lab-gap-fill'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sileo-repo
          publish_branch: gh-pages
          force_orphan: false
